services:
  # Django Backend API
  - type: web
    name: vht-copilot-backend
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: vht-copilot-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: vht-co-pilot.onrender.com
      - key: GROQ_API_KEY
        sync: false
      - key: USE_GROQ_LLM
        value: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://vht-co-pilot.vercel.app
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: ^https://vht-co-pilot-.*\.vercel\.app$
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: vht-copilot-db
    databaseName: vht_copilot
    plan: free
    user: vht_copilot_user
